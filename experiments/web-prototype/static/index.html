<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ai-pair-proto</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg: #0e0f12;
      --panel: #14171c;
      --fg: #e6e6e6;
      --muted: #8a8f98;
      --accent: #6ea8fe;
      --accent-2: #a371f7;
      --user: #c0c5cc;
      --tool: #b392f0;
      --rule: #2a2d34;
      --result: #6e7681;
      --error: #ff7b72;
      --success: #56d364;
      --border: #23262d;
      --code-bg: #1a1d22;
      --col-border: #2a2d34;
      --col-border-chosen: var(--accent);
      --col-border-dim: #1f2228;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      line-height: 1.55;
    }
    body { display: flex; flex-direction: column; }

    header {
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      font-size: 12px;
    }
    header h1 { font-size: 12px; font-weight: 500; margin: 0; color: var(--muted); }
    .status { color: var(--muted); }
    .status.connected { color: var(--success); }
    .status.disconnected { color: var(--error); }

    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .step { margin-bottom: 22px; }
    .step-question {
      color: var(--user);
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 12px;
    }
    .step-question::before { content: "❯ "; color: var(--accent); }

    /* Two columns */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 8px 0 12px 0;
    }
    .option {
      background: var(--panel);
      border: 1px solid var(--col-border);
      border-radius: 6px;
      padding: 12px 14px;
      transition: border-color 0.15s, opacity 0.15s;
      display: flex; flex-direction: column;
      min-height: 80px;
    }
    .option .col-marker {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .option .title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--fg);
    }
    .option .body {
      font-size: 13px;
      color: var(--fg);
      flex: 1;
    }
    .option.chosen {
      border-color: var(--col-border-chosen);
      box-shadow: 0 0 0 1px var(--col-border-chosen);
    }
    .option.chosen .col-marker { color: var(--accent); }
    .option.chosen .col-marker::after { content: "  ✓"; color: var(--accent); }
    .option.dimmed {
      opacity: 0.45;
      cursor: default;
    }
    .option.dimmed:hover { border-color: var(--col-border); }
    .columns.locked .option { cursor: default; }
    .columns.locked .option:not(.chosen) { opacity: 0.45; }
    .columns.locked .option:hover:not(.chosen) { border-color: var(--col-border); }

    /* Markdown inside option body */
    .option .body .md p { margin: 0 0 6px 0; }
    .option .body .md p:last-child { margin-bottom: 0; }
    .option .body .md ul, .option .body .md ol { margin: 4px 0; padding-left: 18px; }
    .option .body .md code { background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    .option .body .md pre:not(.diff-block) { background: var(--code-bg); padding: 8px; border-radius: 4px; overflow-x: auto; }
    .option .body .md pre code { background: transparent; padding: 0; }
    .option .body .md strong { font-weight: 600; }
    .option .body .md em { font-style: italic; }

    /* Inline discussion / feedback prose under a step */
    .inline-msg { margin: 8px 0 4px 0; }
    .inline-msg.discuss::before { content: "💬 "; }
    .inline-msg .md p { margin: 0 0 8px 0; }
    .inline-msg .md p:last-child { margin-bottom: 0; }
    .inline-msg .md h1, .inline-msg .md h2, .inline-msg .md h3 {
      font-size: 14px; font-weight: 600; margin: 8px 0 4px 0;
      padding-bottom: 4px; border-bottom: 1px solid var(--rule);
    }
    .inline-msg .md ul, .inline-msg .md ol { margin: 4px 0 8px 0; padding-left: 18px; }
    .inline-msg .md code { background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-size: 13px; }
    .inline-msg .md pre:not(.diff-block) { background: var(--code-bg); padding: 8px 12px; border-radius: 4px; overflow-x: auto; }
    .inline-msg .md pre code { background: transparent; padding: 0; }
    .inline-msg .md strong { font-weight: 600; }
    .inline-msg .md em { font-style: italic; }
    .inline-msg .stream { white-space: pre-wrap; word-wrap: break-word; }

    .step-footer {
      color: var(--result);
      font-size: 11px;
      margin-top: 6px;
    }
    .step-footer::before { content: "✻ "; }

    .spinner {
      color: var(--muted);
      font-size: 12px;
      margin: 6px 0;
    }
    .spinner::before {
      content: "✳ ";
      display: inline-block;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.3 } 50% { opacity: 1 } }

    .selection-banner {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      font-style: italic;
    }
    .error-line { color: var(--error); margin: 6px 0; }

    /* Tool calls and results */
    .tool-call {
      color: var(--tool);
      margin: 4px 0;
      font-size: 13px;
    }
    .tool-call::before { content: "⏺ "; opacity: 0.85; }
    .tool-call .args { color: var(--muted); }
    .tool-summary {
      color: var(--muted);
      font-size: 12px;
      margin: -2px 0 6px 18px;
      cursor: pointer;
      user-select: none;
    }
    .tool-summary.error { color: var(--error); }
    .tool-summary .expand-hint { opacity: 0.6; }
    .tool-output {
      display: none;
      background: var(--code-bg);
      color: var(--muted);
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      margin: 0 0 8px 18px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .tool-output.expanded { display: block; }

    /* Diff rendering — colors match Claude Code's Edit-tool diff output. */
    pre.diff-block {
      background: var(--code-bg);
      padding: 8px 0;
      border-radius: 4px;
      overflow-x: auto;
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.45;
    }
    pre.diff-block code { background: transparent; padding: 0; display: block; }
    /* :where() keeps these rules at specificity 0,0,0 so hljs syntax tokens
       (color: ...) override the per-line foreground inside diffs while still
       keeping the line background. */
    :where(.diff-line) { display: block; padding: 0 10px; white-space: pre; }
    :where(.diff-line.diff-add) { background: rgb(2, 40, 0); color: rgb(80, 200, 80); }
    :where(.diff-line.diff-del) { background: rgb(61, 1, 0); color: rgb(220, 90, 90); }
    :where(.diff-line.diff-ctx) { color: rgb(248, 248, 242); }
    :where(.diff-num) {
      color: rgba(248, 248, 242, 0.42);
      display: inline-block;
      min-width: 3ch;
      text-align: right;
    }
    :where(.diff-hunk) {
      color: rgb(102, 217, 239);
      display: block;
      padding: 0 10px;
      white-space: pre;
    }
    :where(.diff-meta) {
      color: rgb(153, 153, 153);
      display: block;
      padding: 0 10px;
      white-space: pre;
    }

    /* Composer */
    .composer { background: var(--bg); }
    .composer .rule { border-top: 1px solid var(--rule); height: 0; margin: 0; }
    .composer .input-row { display: flex; align-items: flex-start; padding: 8px 16px; gap: 8px; }
    .composer .prompt-mark { color: var(--accent); padding-top: 1px; flex: 0 0 auto; }
    textarea {
      flex: 1;
      background: transparent;
      color: var(--fg);
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      min-height: 22px;
      max-height: 200px;
      outline: none;
    }
    .composer .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 16px 8px 16px;
      color: var(--muted);
      font-size: 11px;
      gap: 8px;
    }
    .mode-buttons { display: flex; gap: 6px; }
    .mode-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 2px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    .mode-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }
    .mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .mode-hint { color: var(--result); }

    .test-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 6px 16px 0 16px;
      font-size: 11px;
      color: var(--result);
    }
    .test-bar .label { color: var(--result); }
    .test-btn {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--rule);
      border-radius: 12px;
      padding: 2px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    .test-btn:hover { color: var(--accent); border-color: var(--accent); }
    .test-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>ai-pair-proto</h1>
    <span id="status" class="status">connecting…</span>
  </header>
  <div id="transcript"></div>
  <form id="form" class="composer">
    <div class="test-bar">
      <span class="label">starters ›</span>
      <button type="button" class="test-btn" data-prompt="Let's build a tic-tac-toe game together.">Tic-tac-toe</button>
      <button type="button" class="test-btn" data-prompt="Let's solve the Leetcode staircase ascent problem together.">Staircase</button>
      <button type="button" class="test-btn" data-prompt="Let's solve the Exercism Luhn code problem together.">Luhn</button>
    </div>
    <div class="rule"></div>
    <div class="input-row">
      <span class="prompt-mark">❯</span>
      <textarea id="input" autofocus></textarea>
    </div>
    <div class="rule"></div>
    <div class="footer">
      <span class="left">⏵⏵ bypass permissions · click an option, or type to discuss / steer</span>
      <span class="right">opus 4.7</span>
    </div>
  </form>

  <script>
    marked.setOptions({ gfm: true, breaks: false });

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    // Map a filename extension to a hljs language id.
    const EXT_TO_LANG = {
      py: "python", js: "javascript", mjs: "javascript", ts: "typescript",
      jsx: "javascript", tsx: "typescript", go: "go", rs: "rust",
      rb: "ruby", java: "java", kt: "kotlin", swift: "swift",
      c: "c", h: "c", cc: "cpp", cpp: "cpp", hpp: "cpp",
      cs: "csharp", php: "php", sh: "bash", bash: "bash", zsh: "bash",
      sql: "sql", html: "xml", htm: "xml", xml: "xml",
      css: "css", scss: "scss", less: "less",
      json: "json", yaml: "yaml", yml: "yaml", md: "markdown", toml: "ini",
    };
    function detectDiffLang(text) {
      // Look for a filename in the diff metadata (+++ <name> or --- <name>).
      const m = text.match(/^(?:\+\+\+|---) (?:[ab]\/)?(\S+)/m);
      if (!m) return null;
      const ext = m[1].split(".").pop().toLowerCase();
      return EXT_TO_LANG[ext] || null;
    }
    function highlightCodeFragment(content, lang) {
      if (!content) return "";
      if (typeof hljs === "undefined") return escapeHtml(content);
      try {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(content, { language: lang, ignoreIllegals: true }).value;
        }
        // Fall back to auto-detect; safe-ish on multi-line content.
        return hljs.highlightAuto(content).value;
      } catch {
        return escapeHtml(content);
      }
    }

    function colorizeDiffLines(text) {
      // Parse @@ -OLD,_ +NEW,_ @@ headers to track running line numbers, then
      // emit per-line spans with right-aligned 3-char line numbers and the
      // marker char (-/+/ ) — matching Claude Code's Edit diff format. Each
      // line's code fragment is syntax-highlighted via hljs.
      const lang = detectDiffLang(text);
      let oldLine = null;
      let newLine = null;
      const out = [];
      const fmtNum = (n) => n === null ? "   " : String(n).padStart(3, " ");
      const hl = (s) => highlightCodeFragment(s, lang);
      for (const line of (text || "").split("\n")) {
        if (line.startsWith("@@")) {
          const m = line.match(/^@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
          if (m) {
            oldLine = parseInt(m[1], 10);
            newLine = parseInt(m[2], 10);
          }
          out.push(`<span class="diff-hunk">${escapeHtml(line)}</span>`);
        } else if (line.startsWith("+++") || line.startsWith("---")) {
          out.push(`<span class="diff-meta">${escapeHtml(line)}</span>`);
        } else if (line.startsWith("+")) {
          const num = fmtNum(newLine);
          if (newLine !== null) newLine++;
          out.push(`<span class="diff-line diff-add"><span class="diff-num">${num}</span>+${hl(line.slice(1))}</span>`);
        } else if (line.startsWith("-")) {
          const num = fmtNum(oldLine);
          if (oldLine !== null) oldLine++;
          out.push(`<span class="diff-line diff-del"><span class="diff-num">${num}</span>-${hl(line.slice(1))}</span>`);
        } else {
          // Context (typically starts with " ")
          const num = fmtNum(newLine);
          if (newLine !== null) newLine++;
          if (oldLine !== null) oldLine++;
          const content = line.startsWith(" ") ? line.slice(1) : line;
          out.push(`<span class="diff-line diff-ctx"><span class="diff-num">${num}</span> ${hl(content)}</span>`);
        }
      }
      return out.join("");
    }
    // Run after marked.parse(). Detect diff blocks (by lang tag OR by content)
    // and replace their inner HTML with colored spans. Robust to marked
    // version differences and to Claude omitting the "diff" lang tag.
    function postProcessDiffs(html) {
      const tmp = document.createElement("div");
      tmp.innerHTML = html;
      tmp.querySelectorAll("pre code").forEach((codeEl) => {
        const cls = codeEl.className || "";
        const text = codeEl.textContent || "";
        const isDiffLang = /\blanguage-diff\b/i.test(cls);
        // Heuristic: contains a unified-diff hunk header, or has +/- lines
        // that aren't just C-style ++/-- operators.
        const isDiffContent =
          /^@@[^\n]*@@/m.test(text) ||
          /^(?:\+\+\+|---)\s/m.test(text) ||
          (/(^|\n)[+\-][^\+\-]/.test(text) && /(^|\n)[+\-]/g.test(text));
        if (isDiffLang || isDiffContent) {
          const pre = codeEl.parentElement;
          if (pre) pre.classList.add("diff-block");
          codeEl.innerHTML = colorizeDiffLines(text);
        }
      });
      return tmp.innerHTML;
    }
    function renderMarkdown(src) {
      try { return postProcessDiffs(marked.parse(src || "")); }
      catch { return escapeHtml(src || ""); }
    }

    // Format a tool's input arguments as a single short summary string.
    function summarizeToolInputForCall(input) {
      if (!input || typeof input !== "object") return "";
      const preferred = ["command", "file_path", "path", "pattern", "url", "prompt", "query"];
      for (const k of preferred) {
        if (typeof input[k] === "string") {
          const v = input[k];
          return v.length > 80 ? v.slice(0, 80) + "…" : v;
        }
      }
      try {
        const s = JSON.stringify(input);
        return s.length > 80 ? s.slice(0, 80) + "…" : s;
      } catch { return ""; }
    }

    function summarizeToolResult(name, text, isError) {
      if (isError) {
        const firstLine = (text || "Error").split("\n")[0].trim();
        return firstLine.length > 100 ? firstLine.slice(0, 100) + "…" : firstLine;
      }
      const lines = (text || "").split("\n").filter((l) => l.length > 0);
      switch (name) {
        case "Read": return `Read ${lines.length} line${lines.length === 1 ? "" : "s"}`;
        case "Write": return "Wrote file";
        case "Edit": return "Applied edit";
        case "Bash":
          if (lines.length === 0) return "(no output)";
          if (lines.length === 1) return lines[0].length > 80 ? lines[0].slice(0, 80) + "…" : lines[0];
          return `${lines.length} lines`;
        case "Glob":
        case "Grep": return `${lines.length} match${lines.length === 1 ? "" : "es"}`;
        default:
          if (!lines.length) return "ok";
          if (lines.length === 1) return lines[0].length > 80 ? lines[0].slice(0, 80) + "…" : lines[0];
          return `${lines.length} lines`;
      }
    }

    const transcript = document.getElementById("transcript");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const statusEl = document.getElementById("status");

    let ws;
    let currentExchangeEl = null;     // wrap for the in-flight exchange (one user-action -> one assistant turn)
    let currentInlineMsg = null;      // {wrap, stream, finalized} for the active streaming text block
    let currentStreamRaw = "";
    let currentSpinnerEl = null;
    let currentSpinnerInterval = null;

    // Per-message tool-use tracking: index → {el, argsEl, jsonBuf, name, id}
    let activeToolCalls = {};
    // tool_use_id → {name} so we can render results with the right tool name
    let toolUsesById = {};

    // Whimsical loader words rotating during model wait — Claude-Code-ish flavor.
    const LOADING_WORDS = [
      "Thinking", "Pondering", "Cogitating", "Musing", "Ruminating",
      "Brewing", "Brainstorming", "Mulling", "Deliberating", "Reflecting",
      "Considering", "Distilling", "Crystallizing", "Reasoning", "Plotting",
    ];
    function pickLoadingWord() {
      return LOADING_WORDS[Math.floor(Math.random() * LOADING_WORDS.length)];
    }

    // Apply highlight.js to all <pre><code> blocks under `root`, except diff blocks
    // (we render those ourselves via postProcessDiffs).
    function applySyntaxHighlighting(root) {
      if (!root || typeof hljs === "undefined") return;
      root.querySelectorAll("pre code").forEach((el) => {
        if (el.classList.contains("language-diff")) return;
        if (el.closest("pre.diff-block")) return;
        try {
          hljs.highlightElement(el);
        } catch { /* ignore */ }
      });
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = "status " + (cls || "");
    }

    function scrollDown() {
      transcript.scrollTop = transcript.scrollHeight;
    }

    function showSpinner() {
      hideSpinner();
      currentSpinnerEl = document.createElement("div");
      currentSpinnerEl.className = "spinner";
      currentSpinnerEl.textContent = pickLoadingWord() + "…";
      (currentExchangeEl || transcript).appendChild(currentSpinnerEl);
      // Rotate the word every few seconds while the spinner is up.
      currentSpinnerInterval = setInterval(() => {
        if (currentSpinnerEl) currentSpinnerEl.textContent = pickLoadingWord() + "…";
      }, 2200);
      scrollDown();
    }
    function hideSpinner() {
      if (currentSpinnerInterval) { clearInterval(currentSpinnerInterval); currentSpinnerInterval = null; }
      if (currentSpinnerEl) { currentSpinnerEl.remove(); currentSpinnerEl = null; }
    }

    function startExchange(userText /* string | null */) {
      currentExchangeEl = document.createElement("div");
      currentExchangeEl.className = "step"; // reuse existing styling
      if (userText) {
        const q = document.createElement("div");
        q.className = "step-question";
        q.textContent = userText;
        currentExchangeEl.appendChild(q);
      }
      transcript.appendChild(currentExchangeEl);
      currentInlineMsg = null;
      currentStreamRaw = "";
      activeToolCalls = {};
      showSpinner();
      scrollDown();
    }

    function startInlineMsg() {
      hideSpinner();
      const div = document.createElement("div");
      div.className = "inline-msg";
      const md = document.createElement("div");
      md.className = "md";
      div.appendChild(md);
      (currentExchangeEl || transcript).appendChild(div);
      currentInlineMsg = { wrap: div, md, finalized: false };
      currentStreamRaw = "";
      scrollDown();
      return currentInlineMsg;
    }

    function streamTextDelta(text) {
      if (!currentInlineMsg) startInlineMsg();
      currentStreamRaw += text;
      // Live markdown render: re-parse on each delta. marked is fast enough that
      // this gives a Claude-Code-style "elements appear as they're complete" feel.
      currentInlineMsg.md.innerHTML = renderMarkdown(currentStreamRaw);
      applySyntaxHighlighting(currentInlineMsg.md);
      scrollDown();
    }

    function startToolCall(index, id, name) {
      // Finalize streaming text so the tool pill appears below the prose.
      finalizeStreamingMsg();
      currentInlineMsg = null;
      currentStreamRaw = "";

      const div = document.createElement("div");
      div.className = "tool-call";
      const nameEl = document.createElement("span");
      nameEl.textContent = name || "tool";
      const args = document.createElement("span");
      args.className = "args";
      div.appendChild(nameEl);
      div.appendChild(document.createTextNode("("));
      div.appendChild(args);
      div.appendChild(document.createTextNode(")"));
      (currentExchangeEl || transcript).appendChild(div);

      activeToolCalls[index] = { el: div, argsEl: args, jsonBuf: "", name, id };
      if (id) toolUsesById[id] = { name };
      scrollDown();
    }

    function streamToolInputDelta(index, partial) {
      const entry = activeToolCalls[index];
      if (!entry) return;
      entry.jsonBuf += partial;
      try {
        const parsed = JSON.parse(entry.jsonBuf);
        entry.argsEl.textContent = summarizeToolInputForCall(parsed);
      } catch { /* not yet valid JSON */ }
    }

    function renderToolResultBlock(block) {
      let text = "";
      if (typeof block.content === "string") text = block.content;
      else if (Array.isArray(block.content)) {
        text = block.content
          .map((c) => (typeof c === "object" && c && c.text != null ? c.text : ""))
          .join("");
      }
      const tu = toolUsesById[block.tool_use_id];
      const name = (tu && tu.name) || "Tool";

      const summary = document.createElement("div");
      summary.className = "tool-summary" + (block.is_error ? " error" : "");
      summary.appendChild(document.createTextNode(summarizeToolResult(name, text, block.is_error)));
      const hint = document.createElement("span");
      hint.className = "expand-hint";
      hint.textContent = text ? "  · click to expand" : "";
      summary.appendChild(hint);

      const output = document.createElement("div");
      output.className = "tool-output";
      output.textContent = text || "";

      summary.addEventListener("click", () => {
        if (!text) return;
        output.classList.toggle("expanded");
      });

      (currentExchangeEl || transcript).appendChild(summary);
      (currentExchangeEl || transcript).appendChild(output);
      scrollDown();
    }

    function finalizeStreamingMsg() {
      if (!currentInlineMsg || currentInlineMsg.finalized) return;
      currentInlineMsg.finalized = true;
      // Already rendered as markdown live; just do one final re-parse + highlight.
      try {
        currentInlineMsg.md.innerHTML = renderMarkdown(currentStreamRaw);
        applySyntaxHighlighting(currentInlineMsg.md);
      } catch { /* leave whatever's there */ }
    }

    function renderColumns(toolUseId, options) {
      hideSpinner();
      // If text was streaming, finalize it first so columns appear after.
      finalizeStreamingMsg();
      currentInlineMsg = null;
      currentStreamRaw = "";

      const columnsEl = document.createElement("div");
      columnsEl.className = "columns";
      options.forEach((opt, i) => {
        const card = document.createElement("div");
        card.className = "option";
        card.dataset.index = i;

        const marker = document.createElement("div");
        marker.className = "col-marker";
        marker.textContent = String.fromCharCode(65 + i); // A, B
        card.appendChild(marker);

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = opt.title || "(untitled)";
        card.appendChild(title);

        const body = document.createElement("div");
        body.className = "body";
        const md = document.createElement("div");
        md.className = "md";
        md.innerHTML = renderMarkdown(opt.body);
        body.appendChild(md);
        applySyntaxHighlighting(md);
        card.appendChild(body);

        columnsEl.appendChild(card);
      });

      (currentExchangeEl || transcript).appendChild(columnsEl);
      scrollDown();
    }

    function endExchange(durationMs) {
      finalizeStreamingMsg();
      hideSpinner();
      const footer = document.createElement("div");
      footer.className = "step-footer";
      footer.textContent = `Crunched for ${(durationMs / 1000).toFixed(1)}s`;
      (currentExchangeEl || transcript).appendChild(footer);
      input.disabled = false;
      input.focus();
      currentInlineMsg = null;
      currentStreamRaw = "";
      scrollDown();
    }

    function handleStreamEvent(ev) {
      const inner = ev.event;
      if (!inner) return;
      switch (inner.type) {
        case "message_start":
          currentInlineMsg = null;
          currentStreamRaw = "";
          activeToolCalls = {};
          break;
        case "content_block_start": {
          const cb = inner.content_block || {};
          if (cb.type === "text") {
            startInlineMsg();
          } else if (cb.type === "tool_use") {
            // Server already filters out our propose tool's stream events,
            // so any tool_use here is a real CLI tool (Read/Write/Edit/Bash/...).
            startToolCall(inner.index, cb.id, cb.name);
          }
          break;
        }
        case "content_block_delta": {
          const delta = inner.delta || {};
          if (delta.type === "text_delta") {
            streamTextDelta(delta.text || "");
          } else if (delta.type === "input_json_delta") {
            streamToolInputDelta(inner.index, delta.partial_json || "");
          }
          break;
        }
        case "content_block_stop":
          finalizeStreamingMsg();
          break;
      }
    }

    function handleEvent(ev) {
      switch (ev.type) {
        case "user": {
          // Two flavors: text echo (already rendered optimistically when user typed),
          // or a tool_result block (when a real tool finished). Render the latter.
          const content = (ev.message && ev.message.content) || [];
          for (const block of content) {
            if (block.type === "tool_result") renderToolResultBlock(block);
          }
          break;
        }
        case "stream_event":
          handleStreamEvent(ev);
          break;
        case "assistant": {
          // Backstop: in case the consolidated assistant message has tool_use input
          // that didn't fully stream as input_json_delta, update the args text.
          const content = (ev.message && ev.message.content) || [];
          content.forEach((block) => {
            if (block.type === "tool_use" && block.id) {
              toolUsesById[block.id] = { name: block.name };
              // Find the matching active tool call by id to fix up args.
              for (const k in activeToolCalls) {
                const e = activeToolCalls[k];
                if (e.id === block.id) {
                  e.argsEl.textContent = summarizeToolInputForCall(block.input);
                }
              }
            }
          });
          break;
        }
        case "options":
          renderColumns(ev.tool_use_id, ev.options || []);
          break;
        case "result":
          endExchange(ev.duration_ms || 0);
          break;
        case "system":
          break;
        case "error": {
          hideSpinner();
          const div = document.createElement("div");
          div.className = "error-line";
          div.textContent = "error: " + ev.message;
          (currentExchangeEl || transcript).appendChild(div);
          input.disabled = false;
          break;
        }
      }
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(proto + "//" + location.host + "/ws");
      ws.onopen = () => setStatus("connected", "connected");
      ws.onclose = () => {
        setStatus("disconnected — refresh to reconnect", "disconnected");
        input.disabled = true;
      };
      ws.onerror = () => setStatus("error", "disconnected");
      ws.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); }
        catch (err) { console.error("bad message", e.data, err); }
      };
    }

    function send() {
      const text = input.value.trim();
      if (!text) return;
      if (ws.readyState !== WebSocket.OPEN) return;
      startExchange(text);
      ws.send(JSON.stringify({ type: "user_message", text }));
      input.value = "";
      input.style.height = "auto";
      input.disabled = true;
    }

    form.addEventListener("submit", (e) => { e.preventDefault(); send(); });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 200) + "px";
    });

    // Quick-launch test prompts: fill the textarea and fire as a step.
    const testBtns = document.querySelectorAll(".test-btn");
    function setTestBtnsDisabled(b) {
      testBtns.forEach((btn) => { btn.disabled = b; });
    }
    testBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (input.disabled || btn.disabled) return;
        input.value = btn.dataset.prompt || "";
        send();
      });
    });
    // Mirror input.disabled into the test buttons via a tiny observer.
    new MutationObserver(() => setTestBtnsDisabled(input.disabled))
      .observe(input, { attributes: true, attributeFilter: ["disabled"] });

    connect();
  </script>
</body>
</html>
