<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ai-pair-proto</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <style>
    :root {
      --bg: #0e0f12;
      --panel: #14171c;
      --fg: #e6e6e6;
      --muted: #8a8f98;
      --accent: #6ea8fe;
      --accent-2: #a371f7;
      --user: #c0c5cc;
      --tool: #b392f0;
      --rule: #2a2d34;
      --result: #6e7681;
      --error: #ff7b72;
      --success: #56d364;
      --border: #23262d;
      --code-bg: #1a1d22;
      --col-border: #2a2d34;
      --col-border-chosen: var(--accent);
      --col-border-dim: #1f2228;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      line-height: 1.55;
    }
    body { display: flex; flex-direction: column; }

    header {
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      font-size: 12px;
    }
    header h1 { font-size: 12px; font-weight: 500; margin: 0; color: var(--muted); }
    .status { color: var(--muted); }
    .status.connected { color: var(--success); }
    .status.disconnected { color: var(--error); }

    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .step { margin-bottom: 22px; }
    .step-question {
      color: var(--user);
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 12px;
    }
    .step-question::before { content: "❯ "; color: var(--accent); }

    /* Three columns */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin: 8px 0 12px 0;
    }
    .option {
      background: var(--panel);
      border: 1px solid var(--col-border);
      border-radius: 6px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s, opacity 0.15s, transform 0.05s;
      display: flex; flex-direction: column;
      min-height: 80px;
    }
    .option:hover {
      border-color: var(--accent);
    }
    .option:active { transform: translateY(1px); }
    .option .col-marker {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .option .title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--fg);
    }
    .option .body {
      font-size: 13px;
      color: var(--fg);
      flex: 1;
    }
    .option.chosen {
      border-color: var(--col-border-chosen);
      box-shadow: 0 0 0 1px var(--col-border-chosen);
    }
    .option.chosen .col-marker { color: var(--accent); }
    .option.chosen .col-marker::after { content: "  ✓"; color: var(--accent); }
    .option.dimmed {
      opacity: 0.45;
      cursor: default;
    }
    .option.dimmed:hover { border-color: var(--col-border); }
    .columns.locked .option { cursor: default; }
    .columns.locked .option:not(.chosen) { opacity: 0.45; }
    .columns.locked .option:hover:not(.chosen) { border-color: var(--col-border); }

    /* Markdown inside option body */
    .option .body .md p { margin: 0 0 6px 0; }
    .option .body .md p:last-child { margin-bottom: 0; }
    .option .body .md ul, .option .body .md ol { margin: 4px 0; padding-left: 18px; }
    .option .body .md code { background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    .option .body .md pre { background: var(--code-bg); padding: 8px; border-radius: 4px; overflow-x: auto; }
    .option .body .md pre code { background: transparent; padding: 0; }
    .option .body .md strong { font-weight: 600; }
    .option .body .md em { font-style: italic; }

    /* Inline discussion / feedback prose under a step */
    .inline-msg { margin: 8px 0 4px 0; }
    .inline-msg.discuss::before { content: "💬 "; }
    .inline-msg .md p { margin: 0 0 8px 0; }
    .inline-msg .md p:last-child { margin-bottom: 0; }
    .inline-msg .md h1, .inline-msg .md h2, .inline-msg .md h3 {
      font-size: 14px; font-weight: 600; margin: 8px 0 4px 0;
      padding-bottom: 4px; border-bottom: 1px solid var(--rule);
    }
    .inline-msg .md ul, .inline-msg .md ol { margin: 4px 0 8px 0; padding-left: 18px; }
    .inline-msg .md code { background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-size: 13px; }
    .inline-msg .md pre { background: var(--code-bg); padding: 8px 12px; border-radius: 4px; overflow-x: auto; }
    .inline-msg .md pre code { background: transparent; padding: 0; }
    .inline-msg .md strong { font-weight: 600; }
    .inline-msg .md em { font-style: italic; }
    .inline-msg .stream { white-space: pre-wrap; word-wrap: break-word; }

    .step-footer {
      color: var(--result);
      font-size: 11px;
      margin-top: 6px;
    }
    .step-footer::before { content: "✻ "; }

    .spinner {
      color: var(--muted);
      font-size: 12px;
      margin: 6px 0;
    }
    .spinner::before {
      content: "✳ ";
      display: inline-block;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.3 } 50% { opacity: 1 } }

    .selection-banner {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      font-style: italic;
    }
    .error-line { color: var(--error); margin: 6px 0; }

    /* Composer */
    .composer { background: var(--bg); }
    .composer .rule { border-top: 1px solid var(--rule); height: 0; margin: 0; }
    .composer .input-row { display: flex; align-items: flex-start; padding: 8px 16px; gap: 8px; }
    .composer .prompt-mark { color: var(--accent); padding-top: 1px; flex: 0 0 auto; }
    textarea {
      flex: 1;
      background: transparent;
      color: var(--fg);
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      min-height: 22px;
      max-height: 200px;
      outline: none;
    }
    .composer .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 16px 8px 16px;
      color: var(--muted);
      font-size: 11px;
      gap: 8px;
    }
    .mode-buttons { display: flex; gap: 6px; }
    .mode-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 2px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    .mode-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }
    .mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .mode-hint { color: var(--result); }

    .test-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 6px 16px 0 16px;
      font-size: 11px;
      color: var(--result);
    }
    .test-bar .label { color: var(--result); }
    .test-btn {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--rule);
      border-radius: 12px;
      padding: 2px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    .test-btn:hover { color: var(--accent); border-color: var(--accent); }
    .test-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>ai-pair-proto</h1>
    <span id="status" class="status">connecting…</span>
  </header>
  <div id="transcript"></div>
  <form id="form" class="composer">
    <div class="test-bar">
      <span class="label">starters ›</span>
      <button type="button" class="test-btn" data-prompt="Let's build a tic-tac-toe game together.">Tic-tac-toe</button>
      <button type="button" class="test-btn" data-prompt="Let's solve the Leetcode staircase ascent problem together.">Staircase</button>
      <button type="button" class="test-btn" data-prompt="Let's solve the Exercism Luhn code problem together.">Luhn</button>
    </div>
    <div class="rule"></div>
    <div class="input-row">
      <span class="prompt-mark">❯</span>
      <textarea id="input" placeholder="Describe a project to start. Once options appear, click one — or type a question to discuss." autofocus></textarea>
    </div>
    <div class="rule"></div>
    <div class="footer">
      <span class="left">⏵⏵ bypass permissions · click an option, or type to discuss / steer</span>
      <span class="right">opus 4.7</span>
    </div>
  </form>

  <script>
    marked.setOptions({ gfm: true, breaks: false });

    const transcript = document.getElementById("transcript");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const statusEl = document.getElementById("status");

    let ws;
    let currentExchangeEl = null;     // wrap for the in-flight exchange (one user-action -> one assistant turn)
    let currentInlineMsg = null;      // {wrap, stream, finalized} for the active streaming text block
    let currentStreamRaw = "";
    let currentSpinnerEl = null;

    // Track the most-recent columns block so the user's click can be routed correctly
    // and so the columns can be locked when picked. Older columns blocks remain visible
    // and clickable too, but selecting an old one is unusual — we only lock the latest.
    let lastColumnsBlock = null;
    let lastToolUseId = null;
    let lastColumnsLocked = false;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = "status " + (cls || "");
    }

    function scrollDown() {
      transcript.scrollTop = transcript.scrollHeight;
    }

    function showSpinner() {
      hideSpinner();
      currentSpinnerEl = document.createElement("div");
      currentSpinnerEl.className = "spinner";
      currentSpinnerEl.textContent = "Thinking…";
      (currentExchangeEl || transcript).appendChild(currentSpinnerEl);
      scrollDown();
    }
    function hideSpinner() {
      if (currentSpinnerEl) { currentSpinnerEl.remove(); currentSpinnerEl = null; }
    }

    function startExchange(userText /* string | null */) {
      currentExchangeEl = document.createElement("div");
      currentExchangeEl.className = "step"; // reuse existing styling
      if (userText) {
        const q = document.createElement("div");
        q.className = "step-question";
        q.textContent = userText;
        currentExchangeEl.appendChild(q);
      }
      transcript.appendChild(currentExchangeEl);
      currentInlineMsg = null;
      currentStreamRaw = "";
      showSpinner();
      scrollDown();
    }

    function startInlineMsg() {
      hideSpinner();
      const div = document.createElement("div");
      div.className = "inline-msg";
      const stream = document.createElement("div");
      stream.className = "stream";
      div.appendChild(stream);
      (currentExchangeEl || transcript).appendChild(div);
      currentInlineMsg = { wrap: div, stream, finalized: false };
      currentStreamRaw = "";
      scrollDown();
      return currentInlineMsg;
    }

    function streamTextDelta(text) {
      if (!currentInlineMsg) startInlineMsg();
      currentStreamRaw += text;
      currentInlineMsg.stream.textContent = currentStreamRaw;
      scrollDown();
    }

    function finalizeStreamingMsg() {
      if (!currentInlineMsg || currentInlineMsg.finalized) return;
      currentInlineMsg.finalized = true;
      try {
        const html = marked.parse(currentStreamRaw || "");
        const md = document.createElement("div");
        md.className = "md";
        md.innerHTML = html;
        currentInlineMsg.stream.replaceWith(md);
      } catch { /* leave raw */ }
    }

    function renderColumns(toolUseId, options) {
      hideSpinner();
      // If text was streaming, finalize it first so columns appear after.
      finalizeStreamingMsg();
      currentInlineMsg = null;
      currentStreamRaw = "";

      const columnsEl = document.createElement("div");
      columnsEl.className = "columns";
      options.forEach((opt, i) => {
        const card = document.createElement("div");
        card.className = "option";
        card.dataset.index = i;

        const marker = document.createElement("div");
        marker.className = "col-marker";
        marker.textContent = "Option " + (i + 1);
        card.appendChild(marker);

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = opt.title || "(untitled)";
        card.appendChild(title);

        const body = document.createElement("div");
        body.className = "body";
        const md = document.createElement("div");
        md.className = "md";
        try { md.innerHTML = marked.parse(opt.body || ""); }
        catch { md.textContent = opt.body || ""; }
        body.appendChild(md);
        card.appendChild(body);

        card.addEventListener("click", () => onSelectColumn(columnsEl, toolUseId, i));
        columnsEl.appendChild(card);
      });

      (currentExchangeEl || transcript).appendChild(columnsEl);
      lastColumnsBlock = columnsEl;
      lastToolUseId = toolUseId;
      lastColumnsLocked = false;
      scrollDown();
    }

    function onSelectColumn(columnsEl, toolUseId, columnIndex) {
      // Allow clicking only on the most recent unlocked columns block
      if (columnsEl !== lastColumnsBlock || lastColumnsLocked) return;
      lastColumnsLocked = true;
      columnsEl.classList.add("locked");
      const cards = columnsEl.querySelectorAll(".option");
      cards.forEach((c, i) => {
        if (i === columnIndex) c.classList.add("chosen");
        else c.classList.add("dimmed");
      });
      ws.send(JSON.stringify({
        type: "user_message",
        kind: "selected",
        tool_use_id: toolUseId,
        option_index: columnIndex,
      }));
      input.disabled = true;
      // Begin a new exchange for the assistant's follow-up (feedback + next options)
      startExchange(null);
    }

    function endExchange(durationMs) {
      finalizeStreamingMsg();
      hideSpinner();
      const footer = document.createElement("div");
      footer.className = "step-footer";
      footer.textContent = `Crunched for ${(durationMs / 1000).toFixed(1)}s`;
      (currentExchangeEl || transcript).appendChild(footer);
      input.disabled = false;
      input.focus();
      currentInlineMsg = null;
      currentStreamRaw = "";
      scrollDown();
    }

    function handleStreamEvent(ev) {
      const inner = ev.event;
      if (!inner) return;
      switch (inner.type) {
        case "message_start":
          // New assistant message — could be feedback prose, or empty (tool-only)
          // We start a fresh streaming container only when text actually arrives.
          activeStreamingMsgEl = null;
          activeStreamRaw = "";
          break;
        case "content_block_start": {
          const cb = inner.content_block || {};
          if (cb.type === "text") {
            startInlineMsg("feedback");
          }
          break;
        }
        case "content_block_delta": {
          const delta = inner.delta || {};
          if (delta.type === "text_delta") {
            streamTextDelta(delta.text || "");
          }
          break;
        }
        case "content_block_stop":
          finalizeStreamingMsg();
          break;
      }
    }

    function handleEvent(ev) {
      switch (ev.type) {
        case "user":
          // Server-echoed user message; we already rendered ours optimistically.
          break;
        case "stream_event":
          handleStreamEvent(ev);
          break;
        case "assistant":
          // Stream events are sufficient for rendering text/columns.
          break;
        case "options":
          renderColumns(ev.tool_use_id, ev.options || []);
          break;
        case "result":
          endExchange(ev.duration_ms || 0);
          break;
        case "system":
          break;
        case "error": {
          hideSpinner();
          const div = document.createElement("div");
          div.className = "error-line";
          div.textContent = "error: " + ev.message;
          (currentExchangeEl || transcript).appendChild(div);
          input.disabled = false;
          break;
        }
      }
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(proto + "//" + location.host + "/ws");
      ws.onopen = () => setStatus("connected", "connected");
      ws.onclose = () => {
        setStatus("disconnected — refresh to reconnect", "disconnected");
        input.disabled = true;
      };
      ws.onerror = () => setStatus("error", "disconnected");
      ws.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); }
        catch (err) { console.error("bad message", e.data, err); }
      };
    }

    function send() {
      const text = input.value.trim();
      if (!text) return;
      if (ws.readyState !== WebSocket.OPEN) return;
      startExchange(text);
      ws.send(JSON.stringify({ type: "user_message", text }));
      input.value = "";
      input.style.height = "auto";
      input.disabled = true;
    }

    form.addEventListener("submit", (e) => { e.preventDefault(); send(); });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 200) + "px";
    });

    // Quick-launch test prompts: fill the textarea and fire as a step.
    const testBtns = document.querySelectorAll(".test-btn");
    function setTestBtnsDisabled(b) {
      testBtns.forEach((btn) => { btn.disabled = b; });
    }
    testBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (input.disabled || btn.disabled) return;
        input.value = btn.dataset.prompt || "";
        send();
      });
    });
    // Mirror input.disabled into the test buttons via a tiny observer.
    new MutationObserver(() => setTestBtnsDisabled(input.disabled))
      .observe(input, { attributes: true, attributeFilter: ["disabled"] });

    connect();
  </script>
</body>
</html>
