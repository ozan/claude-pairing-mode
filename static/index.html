<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ai-pair-proto</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <style>
    :root {
      --bg: #0e0f12;
      --fg: #e6e6e6;
      --muted: #8a8f98;
      --accent: #6ea8fe;
      --user: #c0c5cc;
      --tool: #b392f0;
      --rule: #2a2d34;
      --result: #6e7681;
      --error: #ff7b72;
      --border: #23262d;
      --code-bg: #1a1d22;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      line-height: 1.55;
    }
    body { display: flex; flex-direction: column; }
    header {
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      font-size: 12px;
    }
    header h1 { font-size: 12px; font-weight: 500; margin: 0; color: var(--muted); }
    .status { color: var(--muted); }
    .status.connected { color: #56d364; }
    .status.disconnected { color: var(--error); }

    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }
    .turn { margin-bottom: 14px; }
    .user-line {
      color: var(--user);
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 10px;
    }
    .user-line::before { content: "❯ "; color: var(--accent); }

    .assistant-msg .md {
      /* markdown container — tag styles below */
    }
    .assistant-msg .md p { margin: 0 0 8px 0; }
    .assistant-msg .md p:last-child { margin-bottom: 0; }
    .assistant-msg .md h1,
    .assistant-msg .md h2,
    .assistant-msg .md h3 {
      font-size: 14px;
      font-weight: 600;
      margin: 8px 0 0 0;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--rule);
    }
    .assistant-msg .md h1::before,
    .assistant-msg .md h2::before,
    .assistant-msg .md h3::before {
      content: "⏺ "; color: var(--fg);
    }
    .assistant-msg .md ul,
    .assistant-msg .md ol { margin: 4px 0 8px 0; padding-left: 18px; }
    .assistant-msg .md li { margin: 2px 0; }
    .assistant-msg .md code {
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 13px;
    }
    .assistant-msg .md pre {
      background: var(--code-bg);
      padding: 8px 12px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .assistant-msg .md pre code {
      background: transparent;
      padding: 0;
    }
    .assistant-msg .md strong { font-weight: 600; }
    .assistant-msg .md em { font-style: italic; color: var(--fg); }
    .assistant-msg .md a { color: var(--accent); }
    .assistant-msg .md blockquote {
      border-left: 2px solid var(--rule);
      padding-left: 10px;
      margin: 6px 0;
      color: var(--muted);
    }

    /* Streaming raw-text fallback before a block is final */
    .assistant-stream {
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .tool-call {
      color: var(--tool);
      margin: 4px 0;
      font-size: 13px;
    }
    .tool-call::before { content: "⏺ "; opacity: 0.85; }
    .tool-call .args { color: var(--muted); }
    .tool-summary {
      color: var(--muted);
      font-size: 12px;
      margin: -2px 0 6px 18px;
      cursor: pointer;
      user-select: none;
    }
    .tool-summary.error { color: var(--error); }
    .tool-summary .expand-hint { opacity: 0.6; }
    .tool-output {
      display: none;
      background: var(--code-bg);
      color: var(--muted);
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      margin: 0 0 8px 18px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .tool-output.expanded { display: block; }

    .thinking-marker {
      color: var(--result);
      font-size: 11px;
      font-style: italic;
      margin: 2px 0;
      opacity: 0.7;
    }
    .thinking-marker::before { content: "◦ "; }

    .turn-footer {
      color: var(--result);
      font-size: 11px;
      margin: 4px 0 6px 0;
    }
    .turn-footer::before { content: "✻ "; }

    .spinner {
      color: var(--muted);
      font-size: 12px;
      margin: 4px 0;
    }
    .spinner::before {
      content: "✳ ";
      display: inline-block;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.3 } 50% { opacity: 1 } }

    .error-line { color: var(--error); margin: 6px 0; }

    /* Input area styled to match CLI: rules above/below + ❯ prefix + status footer */
    .composer { background: var(--bg); }
    .composer .rule {
      border-top: 1px solid var(--rule);
      height: 0; margin: 0;
    }
    .composer .input-row {
      display: flex; align-items: flex-start;
      padding: 8px 16px;
      gap: 8px;
    }
    .composer .prompt-mark {
      color: var(--accent);
      padding-top: 1px;
      flex: 0 0 auto;
    }
    textarea {
      flex: 1;
      background: transparent;
      color: var(--fg);
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      min-height: 22px;
      max-height: 200px;
      outline: none;
    }
    .composer .footer {
      display: flex;
      justify-content: space-between;
      padding: 4px 16px 8px 16px;
      color: var(--muted);
      font-size: 11px;
    }
    .composer .footer .right { color: var(--result); }
  </style>
</head>
<body>
  <header>
    <h1>ai-pair-proto</h1>
    <span id="status" class="status">connecting…</span>
  </header>
  <div id="transcript"></div>
  <form id="form" class="composer">
    <div class="rule"></div>
    <div class="input-row">
      <span class="prompt-mark">❯</span>
      <textarea id="input" placeholder="Message Claude…   (Enter to send, Shift+Enter for newline)" autofocus></textarea>
    </div>
    <div class="rule"></div>
    <div class="footer">
      <span>⏵⏵ bypass permissions</span>
      <span class="right" id="model-line">opus 4.7</span>
    </div>
  </form>

  <script>
    const transcript = document.getElementById("transcript");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const statusEl = document.getElementById("status");

    // Configure marked: GFM, sensible breaks, no auto-headings
    marked.setOptions({ gfm: true, breaks: false });

    let ws;
    let currentTurn = null;
    let currentMsgEl = null;
    let blockEls = {};            // index -> {kind, raw, el, argsEl, jsonBuf, mdEl}
    let toolUsesById = {};        // tool_use_id -> {nameEl, summaryEl, outputEl}
    let activeSpinnerEl = null;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = "status " + (cls || "");
    }

    function ensureTurn() {
      if (!currentTurn) {
        currentTurn = document.createElement("div");
        currentTurn.className = "turn";
        transcript.appendChild(currentTurn);
      }
      return currentTurn;
    }

    function scrollDown() {
      transcript.scrollTop = transcript.scrollHeight;
    }

    function showSpinner() {
      if (activeSpinnerEl) return;
      activeSpinnerEl = document.createElement("div");
      activeSpinnerEl.className = "spinner";
      activeSpinnerEl.textContent = "Thinking…";
      ensureTurn().appendChild(activeSpinnerEl);
      scrollDown();
    }
    function hideSpinner() {
      if (activeSpinnerEl) {
        activeSpinnerEl.remove();
        activeSpinnerEl = null;
      }
    }

    function renderUserInput(text) {
      currentTurn = document.createElement("div");
      currentTurn.className = "turn";
      const div = document.createElement("div");
      div.className = "user-line";
      div.textContent = text;
      currentTurn.appendChild(div);
      transcript.appendChild(currentTurn);
      showSpinner();
      scrollDown();
    }

    function startNewAssistantMessage() {
      hideSpinner();
      const turn = ensureTurn();
      currentMsgEl = document.createElement("div");
      currentMsgEl.className = "assistant-msg";
      turn.appendChild(currentMsgEl);
      blockEls = {};
    }

    function ensureBlock(index, contentBlock) {
      if (blockEls[index]) return blockEls[index];
      if (!currentMsgEl) startNewAssistantMessage();

      let entry;
      if (contentBlock.type === "text") {
        const el = document.createElement("div");
        el.className = "assistant-stream";
        currentMsgEl.appendChild(el);
        entry = { kind: "text", el, raw: "" };
      } else if (contentBlock.type === "tool_use") {
        const el = document.createElement("div");
        el.className = "tool-call";
        const name = document.createElement("span");
        name.textContent = contentBlock.name || "tool";
        const args = document.createElement("span");
        args.className = "args";
        el.appendChild(name);
        el.appendChild(document.createTextNode("("));
        el.appendChild(args);
        el.appendChild(document.createTextNode(")"));
        currentMsgEl.appendChild(el);
        entry = { kind: "tool_use", el, argsEl: args, jsonBuf: "", id: contentBlock.id };
      } else if (contentBlock.type === "thinking") {
        const el = document.createElement("div");
        el.className = "thinking-marker";
        el.textContent = "thinking";
        currentMsgEl.appendChild(el);
        entry = { kind: "thinking", el };
      } else {
        entry = { kind: "unknown" };
      }
      blockEls[index] = entry;
      return entry;
    }

    function summarizeToolInput(input) {
      if (!input || typeof input !== "object") return "";
      const preferred = ["command", "file_path", "path", "pattern", "url", "prompt", "query"];
      for (const k of preferred) {
        if (typeof input[k] === "string") {
          const v = input[k];
          return v.length > 80 ? v.slice(0, 80) + "…" : v;
        }
      }
      try {
        const s = JSON.stringify(input);
        return s.length > 80 ? s.slice(0, 80) + "…" : s;
      } catch {
        return "";
      }
    }

    function summarizeToolResult(name, text, isError) {
      if (isError) {
        const firstLine = (text || "Error").split("\n")[0].trim();
        return firstLine.length > 100 ? firstLine.slice(0, 100) + "…" : firstLine;
      }
      const lines = (text || "").split("\n").filter((l) => l.length > 0);
      switch (name) {
        case "Read":
          return `Read ${lines.length} line${lines.length === 1 ? "" : "s"}`;
        case "Write":
          return "Wrote file";
        case "Edit":
          return "Applied edit";
        case "Bash": {
          if (lines.length === 0) return "(no output)";
          if (lines.length === 1) return lines[0].length > 80 ? lines[0].slice(0, 80) + "…" : lines[0];
          return `${lines.length} lines`;
        }
        case "Glob":
        case "Grep":
          return `${lines.length} match${lines.length === 1 ? "" : "es"}`;
        case "TodoWrite":
          return "Updated todos";
        default:
          if (!lines.length) return "ok";
          if (lines.length === 1) return lines[0].length > 80 ? lines[0].slice(0, 80) + "…" : lines[0];
          return `${lines.length} lines`;
      }
    }

    function renderToolResult(block) {
      const turn = ensureTurn();
      let text = "";
      if (typeof block.content === "string") {
        text = block.content;
      } else if (Array.isArray(block.content)) {
        text = block.content
          .map((c) => (typeof c === "object" && c && c.text != null ? c.text : ""))
          .join("");
      }

      // Find the corresponding tool_use block to learn its name
      let name = "Tool";
      const tu = toolUsesById[block.tool_use_id];
      if (tu && tu.name) name = tu.name;

      const summary = document.createElement("div");
      summary.className = "tool-summary" + (block.is_error ? " error" : "");
      const summaryText = summarizeToolResult(name, text, block.is_error);
      summary.appendChild(document.createTextNode(summaryText));
      const hint = document.createElement("span");
      hint.className = "expand-hint";
      hint.textContent = text ? "  · click to expand" : "";
      summary.appendChild(hint);

      const output = document.createElement("div");
      output.className = "tool-output";
      output.textContent = text || "";

      summary.addEventListener("click", () => {
        if (!text) return;
        output.classList.toggle("expanded");
      });

      turn.appendChild(summary);
      turn.appendChild(output);

      // After tool result, prepare for the next assistant message in this turn
      currentMsgEl = null;
      blockEls = {};
      scrollDown();
    }

    function finalizeTextBlock(entry) {
      if (entry.kind !== "text" || entry.finalized) return;
      entry.finalized = true;
      try {
        const html = marked.parse(entry.raw || "");
        const md = document.createElement("div");
        md.className = "md";
        md.innerHTML = html;
        entry.el.replaceWith(md);
        entry.el = md;
      } catch (err) {
        // Leave raw text in place if marked fails
        console.error("markdown parse failed", err);
      }
    }

    function handleStreamEvent(ev) {
      const inner = ev.event;
      if (!inner) return;
      switch (inner.type) {
        case "message_start":
          startNewAssistantMessage();
          break;
        case "content_block_start": {
          const cb = inner.content_block || {};
          const entry = ensureBlock(inner.index, cb);
          if (cb.type === "tool_use" && cb.id) {
            toolUsesById[cb.id] = { name: cb.name, ...(toolUsesById[cb.id] || {}) };
          }
          break;
        }
        case "content_block_delta": {
          const entry = blockEls[inner.index];
          if (!entry) return;
          const delta = inner.delta || {};
          if (delta.type === "text_delta" && entry.kind === "text") {
            entry.raw += delta.text || "";
            entry.el.textContent = entry.raw;
            scrollDown();
          } else if (delta.type === "input_json_delta" && entry.kind === "tool_use") {
            entry.jsonBuf += delta.partial_json || "";
            try {
              const parsed = JSON.parse(entry.jsonBuf);
              entry.argsEl.textContent = summarizeToolInput(parsed);
            } catch { /* incomplete */ }
          }
          break;
        }
        case "content_block_stop": {
          const entry = blockEls[inner.index];
          if (entry && entry.kind === "text") finalizeTextBlock(entry);
          break;
        }
      }
    }

    function handleAssistant(msg) {
      const content = (msg && msg.content) || [];
      content.forEach((block, i) => {
        const entry = blockEls[i];
        if (!entry) return;
        if (block.type === "tool_use" && entry.kind === "tool_use") {
          entry.argsEl.textContent = summarizeToolInput(block.input);
          if (block.id) toolUsesById[block.id] = { name: block.name };
        } else if (block.type === "text" && entry.kind === "text") {
          // Ensure final markdown render in case stop didn't fire yet
          if (!entry.finalized && (entry.raw || block.text)) {
            entry.raw = block.text || entry.raw;
            entry.el.textContent = entry.raw;
            finalizeTextBlock(entry);
          }
        }
      });
    }

    function handleUser(msg) {
      const content = (msg && msg.content) || [];
      for (const block of content) {
        if (block.type === "tool_result") {
          renderToolResult(block);
        }
      }
    }

    function handleResult(ev) {
      hideSpinner();
      const seconds = (ev.duration_ms || 0) / 1000;
      const footer = document.createElement("div");
      footer.className = "turn-footer";
      footer.textContent = `Crunched for ${seconds.toFixed(1)}s`;
      ensureTurn().appendChild(footer);
      input.disabled = false;
      input.focus();
      currentMsgEl = null;
      blockEls = {};
      currentTurn = null;
      scrollDown();
    }

    function handleEvent(ev) {
      switch (ev.type) {
        case "user": {
          const content = (ev.message && ev.message.content) || [];
          const first = content[0];
          if (first && first.type === "text") {
            renderUserInput(first.text);
          } else {
            handleUser(ev.message);
          }
          break;
        }
        case "stream_event":
          handleStreamEvent(ev);
          break;
        case "assistant":
          handleAssistant(ev.message);
          break;
        case "result":
          handleResult(ev);
          break;
        case "system":
          break;
        case "error": {
          hideSpinner();
          const div = document.createElement("div");
          div.className = "error-line";
          div.textContent = "error: " + ev.message;
          ensureTurn().appendChild(div);
          input.disabled = false;
          break;
        }
      }
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(proto + "//" + location.host + "/ws");
      ws.onopen = () => setStatus("connected", "connected");
      ws.onclose = () => {
        setStatus("disconnected — refresh to reconnect", "disconnected");
        input.disabled = true;
      };
      ws.onerror = () => setStatus("error", "disconnected");
      ws.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); }
        catch (err) { console.error("bad message", e.data, err); }
      };
    }

    function send() {
      const text = input.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: "user_message", text }));
      input.value = "";
      input.disabled = true;
    }

    form.addEventListener("submit", (e) => { e.preventDefault(); send(); });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // Auto-grow textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 200) + "px";
    });

    connect();
  </script>
</body>
</html>
